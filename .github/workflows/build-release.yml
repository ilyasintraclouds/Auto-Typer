name: Build & Release Auto Typer

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.py'
      - 'icon.ico'
      - 'requirements.txt'
      - 'version.txt'
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Read Version
        id: version
        run: |
          $version = Get-Content version.txt -Raw
          $version = $version.Trim()
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8
        shell: pwsh

      - name: Build EXE
        shell: cmd
        run: |
          pyinstaller --onefile --windowed --noconsole ^
            --icon=icon.ico ^
            --add-data "icon.ico;." ^
            --hidden-import=PyQt5.sip ^
            --hidden-import=pyautogui ^
            --clean ^
            --name="Auto Typer" ^
            Typer.py

      - name: Rename EXE with Version
        shell: pwsh
        run: |
          Copy-Item "dist\Auto Typer.exe" "dist\Auto Typer v${{ env.VERSION }}.exe"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Auto-Typer-EXE
          path: dist/Auto Typer v${{ env.VERSION }}.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          files: dist/Auto Typer v${{ env.VERSION }}.exe
          tag_name: v${{ env.VERSION }}
          name: Auto Typer v${{ env.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}